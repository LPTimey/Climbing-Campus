<!doctype html>
<html lang="en">
  <head>
    <script type="importmap">
      {
        "imports": {
          "@/": "./src/",
          "three": "./node_modules/three/build/three.module.js",
          "three/addons": "./node_modules/three/examples/jsm/addons.js",
          "three/fonts": "./node_modules/three/examples/fonts/",
          "echarts": "./node_modules/echarts/dist/echarts.esm.js"
        }
      }
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="assets/favicon-light.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="assets/favicon-dark.svg"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Climbing Campus - Ups and Downs</title>
    <script type="module" src="./src/ui/dash.mjs"></script>
    <script type="module" src="./src/ui/game/element.mjs"></script>
    <script type="module" src="./src/ui/bg/main.mjs"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <nav aria-label="Main navigation">
        <a href="#Intro">Start</a>
        <a href="#Game">Results</a>
        <a href="#Map">Map</a>
        <a href="#Charts">Graphs</a>
        <a href="#Explanation">Explanations</a>
      </nav>
    </header>
    <main>
      <section
        id="Intro"
        style="display: flex; justify-content: center; align-items: center"
      >
        <div class="max-w-wrapper">
          <div
            id="ColorPhiols"
            style="display: none; justify-content: center; align-items: center"
          >
            <div
              style="
                height: 6rem;
                width: 2rem;
                background: linear-gradient(
                  to bottom,
                  var(--blue-light),
                  var(--blue-dark)
                );
              "
            ></div>
            <div
              style="
                height: 6rem;
                width: 2rem;
                background: linear-gradient(
                  to bottom,
                  var(--purple-light),
                  var(--purple-dark)
                );
              "
            ></div>
            <div
              style="
                height: 6rem;
                width: 2rem;
                background: linear-gradient(
                  to bottom,
                  var(--violet-light),
                  var(--violet-dark)
                );
              "
            ></div>
          </div>
          <img
            src="assets/Icons/Climbing Campus/Komposition=Combined, Theme=Dark.svg"
            alt=""
          />
        </div>
      </section>
      <section id="Game">
        <results-game />
      </section>
      <section id="Map">
        <div class="max-w-wrapper"></div>
      </section>
      <section id="Charts">
        <div class="max-w-wrapper" data-center>
          <dash-board />
        </div>
      </section>
      <section id="Explanation"></section>
    </main>
    <canvas id="SiteBG"></canvas>
    <footer>
      <p>
        Made by Tim Ruland
        <a href="https://github.com/LPTimey" target="_blank"> @LPTimey </a>
        and Marc Obst
        <a href="https://github.com/Mangonssen" target="_blank"> @Mangonsen </a>
      </p>
    </footer>
  </body>
</html>
